<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="920" viewBox="0 0 1600 920" role="img" aria-labelledby="title desc">
  <title id="title">Candy 部署架构图</title>
  <desc id="desc">适合产品文档和演示文稿使用的 Candy 架构图，展示 webhook 入口、控制平面、部署模型、执行层和审计存储。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.58" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#fff1f4"/>
    </linearGradient>
    <linearGradient id="candy" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ef3150"/>
      <stop offset="1" stop-color="#2c99f0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" markerWidth="16" markerHeight="16" refX="12" refY="8" orient="auto" markerUnits="strokeWidth">
      <path d="M3 3L13 8L3 13Z" fill="#64748b"/>
    </marker>
    <style>
      .title { font: 800 44px Inter, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #182230; }
      .subtitle { font: 500 18px Inter, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #64748b; }
      .section { font: 800 16px Inter, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #182230; letter-spacing: .06em; }
      .label { font: 800 25px Inter, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #182230; }
      .small { font: 500 17px Inter, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #64748b; }
      .tiny { font: 700 14px Inter, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #64748b; }
      .panel { fill: rgba(255,255,255,.92); stroke: #e2e8f0; stroke-width: 2; filter: url(#shadow); }
      .soft { fill: #f8fafc; stroke: #e2e8f0; stroke-width: 2; }
      .red { fill: #fff1f4; stroke: #ef3150; stroke-width: 2; }
      .blue { fill: #edf6ff; stroke: #2c99f0; stroke-width: 2; }
      .green { fill: #ecfbf3; stroke: #1f8e5e; stroke-width: 2; }
      .yellow { fill: #fff7df; stroke: #b27300; stroke-width: 2; }
      .line { fill: none; stroke: #64748b; stroke-width: 3; stroke-linecap: round; marker-end: url(#arrow); }
      .dash { fill: none; stroke: #94a3b8; stroke-width: 2.5; stroke-dasharray: 8 8; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect width="1600" height="920" rx="0" fill="url(#bg)"/>

  <g transform="translate(90 64)">
    <rect x="0" y="0" width="84" height="54" rx="18" fill="url(#candy)"/>
    <circle cx="42" cy="27" r="18" fill="#ffffff" opacity=".92"/>
    <path d="M31 28h22M42 17v22" stroke="#2f3b4a" stroke-width="5" stroke-linecap="round"/>
    <text x="112" y="34" class="title">Candy 部署架构</text>
    <text x="112" y="68" class="subtitle">兼容 Git Webhook、按环境隔离、由 Runner 执行的持续部署控制平面</text>
  </g>

  <g transform="translate(92 166)">
    <rect class="panel" x="0" y="0" width="1416" height="660" rx="28"/>

    <g transform="translate(42 48)">
      <text class="section" x="0" y="0">外部入口</text>
      <rect class="soft" x="0" y="28" width="270" height="116" rx="18"/>
      <text class="label" x="28" y="78">Git 平台</text>
      <text class="small" x="28" y="110">GitHub / Gitee push 事件</text>
      <text class="tiny" x="28" y="136">Webhook payload + 签名</text>

      <rect class="soft" x="0" y="188" width="270" height="116" rx="18"/>
      <text class="label" x="28" y="238">运维团队</text>
      <text class="small" x="28" y="270">浏览器管理后台</text>
      <text class="tiny" x="28" y="296">仓库、Runner、Secret、日志</text>
    </g>

    <g transform="translate(388 48)">
      <text class="section" x="0" y="0">Candy 控制平面</text>
      <rect class="red" x="0" y="28" width="360" height="276" rx="22"/>
      <text class="label" x="30" y="80">Go API Server</text>
      <text class="small" x="30" y="112">登录、配置与策略校验</text>
      <rect x="30" y="146" width="300" height="48" rx="12" fill="#ffffff" stroke="#f6b8c4"/>
      <text class="tiny" x="54" y="176">Webhook Gateway：签名 / 分支 / 去重</text>
      <rect x="30" y="210" width="300" height="48" rx="12" fill="#ffffff" stroke="#f6b8c4"/>
      <text class="tiny" x="54" y="240">部署任务队列：异步 worker</text>
      <circle cx="316" cy="70" r="18" fill="#ef3150"/>
      <path d="M309 70l5 5l11-12" fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <g transform="translate(388 392)">
      <text class="section" x="0" y="0">部署模型</text>
      <rect class="blue" x="0" y="28" width="360" height="178" rx="22"/>
      <text class="label" x="30" y="80">环境仓库绑定</text>
      <text class="small" x="30" y="112">Production、Testing 或自定义环境</text>
      <text class="tiny" x="30" y="144">共享仓库源 + 分支 + 部署脚本</text>
      <text class="tiny" x="30" y="172">加密 Secret 以环境变量注入</text>
    </g>

    <g transform="translate(830 48)">
      <text class="section" x="0" y="0">执行层</text>
      <rect class="green" x="0" y="28" width="326" height="276" rx="22"/>
      <text class="label" x="30" y="80">中心代码缓存</text>
      <text class="small" x="30" y="112">clone / fetch / checkout commit</text>
      <rect x="30" y="148" width="266" height="48" rx="12" fill="#ffffff" stroke="#a9e3c6"/>
      <text class="tiny" x="54" y="178">本机 Runner：工作目录执行 bash</text>
      <rect x="30" y="212" width="266" height="48" rx="12" fill="#ffffff" stroke="#a9e3c6"/>
      <text class="tiny" x="54" y="242">SSH Runner：scp 同步 + ssh 执行</text>
    </g>

    <g transform="translate(830 392)">
      <text class="section" x="0" y="0">审计与可观测</text>
      <rect class="yellow" x="0" y="28" width="326" height="178" rx="22"/>
      <text class="label" x="30" y="80">SQLite Store</text>
      <text class="small" x="30" y="112">配置、任务与日志</text>
      <text class="tiny" x="30" y="144">stdout / stderr / exit code</text>
      <text class="tiny" x="30" y="172">管理后台查看部署历史</text>
    </g>

    <g transform="translate(1224 48)">
      <text class="section" x="0" y="0">结果</text>
      <rect class="soft" x="0" y="28" width="144" height="526" rx="24"/>
      <circle cx="72" cy="98" r="34" fill="#fff1f4" stroke="#ef3150" stroke-width="2"/>
      <text class="tiny" x="42" y="158">已校验</text>
      <text class="tiny" x="36" y="180">Webhook</text>
      <circle cx="72" cy="250" r="34" fill="#ecfbf3" stroke="#1f8e5e" stroke-width="2"/>
      <text class="tiny" x="44" y="310">Runner</text>
      <text class="tiny" x="42" y="332">执行</text>
      <circle cx="72" cy="402" r="34" fill="#edf6ff" stroke="#2c99f0" stroke-width="2"/>
      <text class="tiny" x="44" y="462">可查看</text>
      <text class="tiny" x="46" y="484">轨迹</text>
    </g>

    <path class="line" d="M312 104H374"/>
    <path class="line" d="M312 264H374"/>
    <path class="line" d="M748 186H816"/>
    <path class="line" d="M748 508H816"/>
    <path class="line" d="M996 324V378"/>
    <path class="line" d="M1156 186H1210"/>
    <path class="dash" d="M996 598C706 640 486 624 200 506"/>
  </g>
</svg>
